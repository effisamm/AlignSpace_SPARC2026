name: Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Frontend ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: as-ai-web/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: as-ai-web   # adjust to your frontend folder

      - name: Lint frontend
        run: npm run lint
        working-directory: as-ai-web

      - name: Test frontend
        run: npm test -- --watchAll=false
        working-directory: as-ai-web

      # --- Backend ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: as-ai-server   # adjust to your backend folder

      - name: Lint backend
        run: pylint src/   # adjust to your source folder
        working-directory: as-ai-server

      - name: Test backend
        run: pytest
        working-directory: as-ai-server

  deploy:
    name: Deploy to DigitalOcean
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger DigitalOcean App Platform deploy
        run: |
          doctl apps create-deployment ${{ secrets.DO_APP_ID }}